<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glow — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="logo">
          <img src="images/logo.png" alt="Glow logo" class="logo-icon" />
        </div>
        <span class="credit">Photo by Imani Bahati on Unsplash</span>
      </div>

      <div class="right-panel">
        <div class="main-panel">
          <p>
            Glow is your gentle space to check in with yourself. Track your
            moods, capture your thoughts, and watch your inner weather shift
            over time. Your softest self-care era starts here.
          </p>
        </div>

        <div class="signup-info">
          <h2 class="form-heading">Let's glow together!</h2>
          <form class="signup-form">
            <div class="form-field">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" />
            </div>
            <div class="form-field">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" />
            </div>
            <div class="form-field">
              <label for="email">Email</label>
              <input type="email" id="email" />
            </div>
            <div class="form-field">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" />
            </div>
            <div class="form-field">
              <label for="password">Password</label>
              <input type="password" id="password" minlength="8" required />
            </div>
            <div class="form-field">
              <label for="confirm-password">Confirm Password</label>
              <input
                type="password"
                id="confirm-password"
                minlength="8"
                required
              />
            </div>
          </form>
        </div>

        <div class="button-area">
          <button class="submit-btn">Create Account</button>
          <p class="login-line">
            Already have an account? <a href="#">Log in</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
